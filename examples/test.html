<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vivi WASM Test</title>
<style>
  body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 2rem; }
  .pass { color: #4ade80; }
  .fail { color: #f87171; }
  #log { white-space: pre; line-height: 1.6; }
  h1 { color: #818cf8; }
</style>
</head>
<body>
<h1>Vivi WASM - Browser Test</h1>
<div id="log"></div>
<script>
const log = document.getElementById('log');
const MAX_ENTITIES = 10000;

function print(msg, pass) {
  const cls = pass === undefined ? '' : (pass ? 'pass' : 'fail');
  const prefix = pass === undefined ? '  ' : (pass ? 'PASS ' : 'FAIL ');
  log.innerHTML += `<span class="${cls}">${prefix}${msg}</span>\n`;
}

function assertClose(actual, expected, label) {
  const ok = Math.abs(actual - expected) < 1e-5;
  print(`${label}: expected ${expected}, got ${actual}`, ok);
  return ok;
}

async function run() {
  print('Loading output.wasm...');

  let wasm;
  try {
    const resp = await fetch('output.wasm');
    const bytes = await resp.arrayBuffer();
    wasm = await WebAssembly.instantiate(bytes);
  } catch (e) {
    print(`Failed to load WASM: ${e}`, false);
    print('Make sure output.wasm is in the same directory and served via HTTP.');
    print('Run: python -m http.server 8000    (from the examples/ folder)');
    return;
  }

  const { init, tick, memory } = wasm.instance.exports;
  print('Module loaded. Exports: init, tick, memory');
  print('');

  // --- Test 1: Single entity movement ---
  print('=== Test 1: Single Entity Movement ===');
  init();

  const mem = new DataView(memory.buffer);
  // entity_count = 1
  mem.setInt32(0, 1, true);

  const posXOff = 4;
  const posYOff = 4 + MAX_ENTITIES * 4;
  const velDxOff = 4 + MAX_ENTITIES * 8;
  const velDyOff = 4 + MAX_ENTITIES * 12;

  // Position[0] = (10, 20), Velocity[0] = (1, 2)
  mem.setFloat32(posXOff, 10.0, true);
  mem.setFloat32(posYOff, 20.0, true);
  mem.setFloat32(velDxOff, 1.0, true);
  mem.setFloat32(velDyOff, 2.0, true);

  tick();

  let allPass = true;
  allPass &= assertClose(mem.getFloat32(posXOff, true), 11.0, 'pos.x after 1 tick');
  allPass &= assertClose(mem.getFloat32(posYOff, true), 22.0, 'pos.y after 1 tick');

  // --- Test 2: Multiple entities, multiple ticks ---
  print('');
  print('=== Test 2: 2 Entities x 3 Ticks ===');
  init();

  const m = new DataView(memory.buffer);
  m.setInt32(0, 2, true);

  // Entity 0: pos(0,0) vel(3,4)
  m.setFloat32(posXOff, 0.0, true);
  m.setFloat32(posYOff, 0.0, true);
  m.setFloat32(velDxOff, 3.0, true);
  m.setFloat32(velDyOff, 4.0, true);

  // Entity 1: pos(100,200) vel(-1,-2)
  m.setFloat32(posXOff + 4, 100.0, true);
  m.setFloat32(posYOff + 4, 200.0, true);
  m.setFloat32(velDxOff + 4, -1.0, true);
  m.setFloat32(velDyOff + 4, -2.0, true);

  tick(); tick(); tick();

  allPass &= assertClose(m.getFloat32(posXOff, true), 9.0, 'entity0.x after 3 ticks');
  allPass &= assertClose(m.getFloat32(posYOff, true), 12.0, 'entity0.y after 3 ticks');
  allPass &= assertClose(m.getFloat32(posXOff + 4, true), 97.0, 'entity1.x after 3 ticks');
  allPass &= assertClose(m.getFloat32(posYOff + 4, true), 194.0, 'entity1.y after 3 ticks');

  print('');
  print(allPass ? '--- ALL TESTS PASSED ---' : '--- SOME TESTS FAILED ---', allPass);
}

run();
</script>
</body>
</html>
